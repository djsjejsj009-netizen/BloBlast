<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloBlast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="crown">👑 <span id="best-score">0</span></div>
        <div class="settings">⚙️</div>
    </div>

    <div class="score-container" id="current-score">0</div>

    <div class="grid-wrapper">
        <div class="grid" id="grid"></div>
    </div>

    <div class="figures-container">
        <div class="figure-slot">
            <div class="mini-block"></div>
            <div class="mini-block"></div>
            <div class="mini-block"></div>
        </div>
        <div class="figure-slot">
            <div class="mini-block vertical"></div>
        </div>
        <div class="figure-slot">
            <div class="mini-block l-shape"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
